<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💗 心动契合度测试</title>
<style>
  :root {
    --primary: #ff8fab;
    --secondary: #ff6b9d;
    --accent: #c77dff;
    --bg-gradient-start: #fff0f3;
    --bg-gradient-mid: #f3e5f5;
    --bg-gradient-end: #e3f2fd;
    --card-bg: rgba(255, 255, 255, 0.85);
    --text-main: #4a4a4a;
    --text-soft: #888;
    --heart: #ff6b9d;
    --star: #ffd700;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* 背景装饰星星 */
  .bg-star {
    position: fixed;
    color: var(--star);
    font-size: clamp(12px, 2vw, 18px);
    pointer-events: none;
    z-index: 0;
    animation: twinkle 3s ease-in-out infinite;
    opacity: 0.6;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.3); }
  }

  /* 背景爱心飘动 */
  .floating-heart-bg {
    position: fixed;
    font-size: clamp(14px, 2.5vw, 20px);
    pointer-events: none;
    z-index: 0;
    animation: heartFloat 8s linear infinite;
    opacity: 0.4;
  }
  @keyframes heartFloat {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* 核心盒子 */
  .box {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    width: 100%;
    height: 100%;
    max-width: 600px;
    max-height: 90vh;
    padding: 25px 20px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15), 0 2px 8px rgba(0,0,0,0.05);
    position: relative;
    z-index: 10;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: none;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.6);
  }

  .title {
    font-size: clamp(22px, 4.5vw, 26px);
    margin-bottom: 12px;
    text-align: center;
    color: var(--secondary);
    font-weight: bold;
    flex-shrink: 0;
    text-shadow: 0 2px 8px rgba(255, 107, 157, 0.2);
    letter-spacing: 2px;
  }

  .progress {
    text-align: center;
    font-size: clamp(12px, 2.5vw, 13px);
    color: var(--text-soft);
    margin-bottom: 15px;
    flex-shrink: 0;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255, 107, 157, 0.1);
    border-radius: 3px;
    margin-bottom: 15px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .question {
    font-size: clamp(16px, 3.2vw, 18px);
    line-height: 1.7;
    color: var(--text-main);
    min-height: 35px;
    margin-bottom: 15px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    overflow-y: auto;
    padding-right: 5px;
  }

  .options::-webkit-scrollbar { width: 4px; }
  .options::-webkit-scrollbar-thumb {
    background: rgba(255, 107, 157, 0.3);
    border-radius: 2px;
  }

  .option {
    padding: 14px 16px;
    border: 2px solid rgba(255, 107, 157, 0.15);
    border-radius: 14px;
    cursor: pointer;
    font-size: clamp(15px, 2.8vw, 17px);
    background: rgba(255, 255, 255, 0.7);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    line-height: 1.4;
    flex-shrink: 0;
    min-height: 48px;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 2;
    color: var(--text-main);
  }

  .option:hover {
    border-color: var(--primary);
    background: rgba(255, 143, 175, 0.08);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255, 107, 157, 0.1);
  }

  .option.selected {
    background: linear-gradient(135deg, rgba(255, 143, 175, 0.2), rgba(199, 125, 255, 0.15));
    border-color: var(--secondary);
    color: var(--secondary);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(255, 107, 157, 0.15);
  }

  .option.locked {
    background: #f8f8f8 !important;
    color: #bbb !important;
    cursor: not-allowed !important;
    border-color: #eee !important;
    transform: none !important;
    box-shadow: none !important;
  }

  .option .emoji-prefix {
    margin-right: 8px;
    font-size: 1.1em;
  }

  .btn-group {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    flex-shrink: 0;
    gap: 12px;
  }

  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    font-size: clamp(15px, 2.5vw, 17px);
    cursor: pointer;
    transition: all 0.3s;
    flex: 1;
    max-width: 130px;
    text-align: center;
    position: relative;
    z-index: 2;
    font-weight: 600;
  }

  .prev-btn {
    background: rgba(255, 255, 255, 0.7);
    color: var(--text-soft);
    border: 2px solid rgba(200, 200, 200, 0.3);
  }
  .prev-btn:hover {
    background: rgba(255, 255, 255, 0.9);
    border-color: var(--primary);
    color: var(--primary);
  }

  .next-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3);
  }
  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
  }
  .next-btn:active { transform: translateY(0); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }

  /* 心跳动画 */
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.15); }
    28% { transform: scale(1); }
    42% { transform: scale(1.12); }
    56% { transform: scale(1); }
  }
  .heartbeat { animation: heartbeat 1.2s ease-in-out infinite; }

  /* 抖动 */
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }
  .wiggle { animation: wiggle 0.5s ease-in-out infinite; }

  /* 弹跳 */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .bounce { animation: bounce 1s ease-in-out infinite; }

  /* 漂浮文字（爱心版） */
  .float-text {
    position: fixed;
    color: var(--secondary);
    font-weight: bold;
    background: rgba(255, 255, 255, 0.8);
    padding: 6px 14px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
    font-size: clamp(14px, 2vw, 16px);
    box-shadow: 0 2px 10px rgba(255, 107, 157, 0.2);
    backdrop-filter: blur(4px);
  }

  /* 全覆盖爱心层 */
  .love-text {
    position: fixed;
    color: var(--secondary);
    opacity: 0.2;
    font-size: clamp(14px, 2.2vw, 18px);
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
    animation: slowFade 3s infinite alternate;
    font-weight: 600;
  }
  @keyframes slowFade {
    0% { opacity: 0.1; transform: scale(0.9); }
    100% { opacity: 0.3; transform: scale(1.1); }
  }

  .q25-pink-mask {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(255, 200, 220, 0.15);
    pointer-events: none;
    z-index: 98;
  }

  /* 全屏甜蜜打字 */
  .fullscreen-love {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #fff0f3, #f8e1f4, #e8f0fe);
    z-index: 99999;
    padding: 30px;
    font-size: clamp(18px, 3.5vw, 22px);
    color: var(--secondary);
    font-weight: bold;
    line-height: 1.8;
    white-space: pre-wrap;
    overflow: hidden;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 名字输入弹窗 */
  .name-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(92vw, 360px);
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255, 107, 157, 0.3);
    border-radius: 20px;
    z-index: 9999999;
    padding: 30px 25px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2);
  }
  .name-modal-title {
    font-size: clamp(18px, 4vw, 22px);
    font-weight: bold;
    color: var(--secondary);
    text-align: center;
  }
  .name-input-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .name-input-group label {
    font-size: clamp(13px, 2.5vw, 14px);
    color: var(--text-soft);
  }
  .name-input-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid rgba(255, 107, 157, 0.2);
    border-radius: 12px;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.8);
    color: var(--text-main);
    transition: border-color 0.3s;
  }
  .name-input-group input:focus {
    outline: none;
    border-color: var(--primary);
  }
  .name-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 30px;
    font-size: clamp(15px, 3vw, 17px);
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3);
    transition: all 0.3s;
  }
  .name-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
  }

  /* 开始提示框 */
  .start-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(90vw, 300px);
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255, 107, 157, 0.3);
    border-radius: 20px;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 25px 20px;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2);
  }
  .start-text {
    font-size: clamp(14px, 2.8vw, 16px);
    color: var(--text-main);
    line-height: 1.8;
    text-align: center;
  }
  .tiny-tip {
    font-size: clamp(10px, 2vw, 11px);
    color: var(--primary);
    text-align: center;
    line-height: 1.4;
    margin: 4px 0;
  }
  .start-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 10px 24px;
    font-size: clamp(14px, 2.5vw, 16px);
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
    transition: all 0.3s;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255, 107, 157, 0.4);
  }

  /* 日记 */
  .diary-wrap {
    display: none;
    width: 100%; height: 100%;
    max-width: 600px; max-height: 90vh;
    padding: 25px 20px;
    border-radius: 20px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
    position: relative;
    z-index: 10;
    overflow: hidden;
    flex-direction: column;
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .diary-date {
    position: absolute;
    top: 15px; left: 20px;
    font-size: clamp(12px, 2.5vw, 14px);
    color: var(--text-soft);
    font-weight: 500;
  }
  .diary-content {
    margin-top: 28px;
    line-height: 2.2;
    font-size: clamp(14px, 2.7vw, 16px);
    color: var(--text-main);
    letter-spacing: 1px;
    height: calc(100% - 80px);
    overflow-y: auto;
    padding-bottom: 10px;
  }
  .diary-content::-webkit-scrollbar { width: 4px; }
  .diary-content::-webkit-scrollbar-thumb {
    background: rgba(255, 107, 157, 0.3);
    border-radius: 2px;
  }
  .diary-page1, .diary-page2, .diary-page3 {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
  }
  .diary-page4 {
    display: none;
    width: 100%; height: 100%;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px 30px;
    box-sizing: border-box;
    position: absolute;
    top: 0; left: 0;
  }
  .diary-page4 .diary-content {
    width: 100%; height: auto;
    margin: 0;
    font-size: clamp(14px, 3.5vw, 16px);
    line-height: 2.2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .page-next, .page-prev {
    position: absolute;
    font-size: clamp(20px, 4.5vw, 24px);
    cursor: pointer;
    color: var(--primary);
    z-index: 1;
    bottom: 15px;
    transition: all 0.3s;
    padding: 5px 10px;
  }
  .page-next:hover, .page-prev:hover {
    transform: scale(1.2);
    color: var(--secondary);
  }
  .page-prev { left: 20px; }
  .page-next { right: 20px; }
  .diary-page2, .diary-page3, .diary-page4 { display: none; }

  /* 最终黑屏甜蜜 */
  .pink-full-text {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #fff0f3, #fce4ec, #f3e5f5);
    z-index: 99999999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: var(--secondary);
    font-size: clamp(22px, 5.5vw, 28px);
    font-weight: bold;
    gap: 30px;
  }
  .pink-confirm-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 14px;
    cursor: pointer;
    font-size: clamp(13px, 2.5vw, 15px);
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3);
    transition: all 0.3s;
  }
  .pink-confirm-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
  }

  .end-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    padding: 35px 30px;
    border-radius: 20px;
    z-index: 99999999;
    text-align: center;
    width: min(90vw, 340px);
    border: 2px solid rgba(255, 107, 157, 0.3);
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2);
  }

  .q16-modal, .submit-modal, .pink-screen {
    width: 100vw; height: 100vh;
  }
  .q16-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(90vw, 220px);
    height: auto;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 3px solid var(--primary);
    border-radius: 20px;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 20px;
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2);
  }
  .q16-text {
    font-size: clamp(16px, 3.5vw, 18px);
    color: var(--secondary);
    font-weight: bold;
  }
  .q16-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 8px 22px;
    font-size: clamp(13px, 2.5vw, 15px);
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
  }

  .submit-modal {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999999;
  }
  .submit-modal-inner {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    padding: 35px 30px;
    border-radius: 20px;
    text-align: center;
    width: min(90vw, 340px);
    border: 2px solid rgba(255, 107, 157, 0.3);
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2);
    box-sizing: border-box;
  }
  .submit-btn {
    padding: 12px 24px;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    margin: 15px 0 8px;
    font-size: clamp(15px, 2.5vw, 17px);
    transition: all 0.3s;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3);
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
  }
  .refuse-tip {
    color: var(--secondary);
    font-size: clamp(11px, 2.5vw, 12px);
  }

  .pink-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #fff0f3, #fce4ec);
    z-index: 9999999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--secondary);
    font-size: clamp(18px, 4.5vw, 22px);
    font-weight: bold;
    text-align: center;
    line-height: 1.8;
  }

  /* 彩虹文字 */
  .rainbow-text {
    background: linear-gradient(90deg, #ff6b9d, #c77dff, #4ecdc4, #ffd93d, #ff6b9d);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbowShift 3s linear infinite;
  }
  @keyframes rainbowShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  /* 气泡效果 */
  .bubble {
    position: fixed;
    border-radius: 50%;
    background: rgba(255, 143, 175, 0.2);
    pointer-events: none;
    z-index: 95;
    animation: bubbleRise 6s ease-in infinite;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* 闪光 */
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
  }
  .sparkle {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 96;
    animation: sparkle 2s ease-in-out infinite;
  }

  /* 打字光标 */
  .cursor-blink::after {
    content: '❤';
    animation: blink 1s step-end infinite;
    margin-left: 4px;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- 背景装饰 -->
<div id="bgDecorations"></div>

<!-- 名字输入弹窗 -->
<div class="name-modal" id="nameModal">
  <div class="name-modal-title">💗 心动契合度测试</div>
  <div style="font-size: 13px; color: #888; text-align: center; line-height: 1.6;">
    自定义测试中的角色名字<br>让体验更贴近你的心意 ♡
  </div>
  <div class="name-input-group">
    <label>💌 追求者（测试发起者）</label>
    <input type="text" id="loverName" value="小月" placeholder="例如：小月">
  </div>
  <div class="name-input-group">
    <label>🌸 被追求者（测试接收者）</label>

  function triggerSweet(text, nextQ) {
    const mask = document.createElement('div');
    mask.className = 'terror-mask';
    mask.style.background = 'linear-gradient(135deg, #fff0f3, #fce4ec, #f3e5f5)';
    const t = document.createElement('div');
    t.className = 'terror-text';
    t.style.color = '#ff6b9d';
    t.style.fontSize = 'clamp(18px, 4vw, 22px)';
    t.style.letterSpacing = '2px';
    mask.appendChild(t);
    document.body.appendChild(mask);
    let idx = 0;

    function ty() {
      if (idx < text.length) {
        t.innerText += text[idx];
        idx++;
        setTimeout(ty, 80);
      } else {
        setTimeout(() => {
          let gt = setInterval(() => {
            t.innerText = t.innerText.split('').sort(() => Math.random() - 0.5).join('');
          }, 60);
          setTimeout(() => {
            clearInterval(gt);
            mask.remove();
            current = nextQ;
            renderQuestion();
          }, 600);
        }, 1000);
      }
    }
    ty();
  }

      }
    };
    modal.append(textEl, btn);
    document.body.appendChild(modal);
  }

  function pinkPunish() {
    const screen = document.createElement("div");
    screen.className = "pink-screen";
    screen.innerHTML = `<div style="font-size: clamp(24px,5vw,32px);">💔</div><div style="margin-top:20px;">${fillText("{beloved}不要拒绝{lover}嘛")}</div>`;
    document.body.appendChild(screen);
    setTimeout(() => {
      screen.innerHTML = `<div style="font-size: clamp(24px,5vw,32px);">💗</div><div style="margin-top:20px; color: #ff6b9d;">${fillText("再给你一次机会♡")}</div>`;
    }, 2000);
    setTimeout(() => {
      screen.remove();
      showInputModal();
    }, 3500);
  }

  function showInputModal() {
    clearAllEffects();
    const modal = document.createElement("div");
    modal.className = "submit-modal";
    const inner = document.createElement("div");
    inner.className = "submit-modal-inner";
    inner.innerHTML = `
      <div style="margin-bottom: 12px; font-size: 16px; text-align: center; font-weight: 600; color: #ff6b9d;">${fillText("请输入告白暗号解锁{lover}的信")}</div>
      <div style="display: flex; flex-direction: column; gap: 16px; align-items: center; width: 100%;">
        <input 
          type="text" 
          id="loveInput" 
          placeholder="${fillText("请输入：{lover}爱{beloved}")}" 
          style="
            font-size: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 107, 157, 0.3);
            border-radius: 12px;
            width: 100%;
            max-width: 280px;
            box-sizing: border-box;
            text-align: center;
            background: rgba(255,255,255,0.8);
            color: #4a4a4a;
          "
        >
        <button class="submit-btn" id="unlockBtn">解锁 ♡</button>
      </div>
    `;
    modal.appendChild(inner);
    document.body.appendChild(modal);

    const input = document.getElementById("loveInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const correctAnswer = fillText("{lover}爱{beloved}");

    input.addEventListener('input', function() {
      const val = input.value.trim();
      if (val === correctAnswer) {
        unlockBtn.disabled = false;
        unlockBtn.classList.remove("locked");
        unlockBtn.style.background = "";
      }
    });

    unlockBtn.onclick = function() {
      const val = input.value.trim();
      if (val === correctAnswer) {
        modal.remove();
        mainBox.style.display = "none";
        resetDiary();
        fillDiaryContent();
        diaryWrap.style.display = "flex";
      } else {
        wrongCount++;
        if (wrongCount === 1) {
          modal.remove();
          pinkPunish();
        } else {
          unlockBtn.disabled = true;
          unlockBtn.classList.add("locked");
          unlockBtn.style.background = "#ccc";
          unlockBtn.style.color = "#999";
        }
      }
    };
  }

  function showFinalModal() {
    clearAllEffects();
    mainBox.style.display = "none";
    const modal = document.createElement("div");
    modal.className = "submit-modal";
    const inner = document.createElement("div");
    inner.className = "submit-modal-inner";
    inner.innerHTML = `
      <div style="font-size:18px;font-weight:bold;color:#ff6b9d;margin-bottom:12px;">💗 测试完成</div>
      <div style="margin:12px 0; color: #666;">${fillText("{lover}有一封信想给你，要看看吗？")}</div>
      <button class="submit-btn" id="yesBtn">要 ♡</button>
      <div class="refuse-tip">${fillText("不准拒绝{lover}哦 ^_^")}</div>
    `;
    modal.appendChild(inner);
    document.body.appendChild(modal);
    document.getElementById("yesBtn").onclick = function() {
      modal.remove();
      showInputModal();
    };
  }

      <span style="color:#ff6b9d; font-size:24px;">爱......</span><br>
    `);

    document.getElementById('diaryContent4').innerHTML = fillText(`
      <div style="color:#999;">又只有{lover}自己了……</div>
      <div style="color:#666;margin:15px 0;">{beloved}愿意成为{lover}的爱人，永远陪着{lover}吗？</div>
      <button class="start-btn" id="agreeBtn" style="background: linear-gradient(135deg, #ff8fab, #ff6b9d); color: #fff; border: none; padding: 12px 28px; border-radius: 14px; font-size: 16px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 16px rgba(255,107,157,0.3);">

      </button>

    // 重新绑定agreeBtn事件
    document.getElementById("agreeBtn").onclick = function() {

      const pinkFull = document.createElement("div");
      pinkFull.className = "pink-full-text";
      document.body.appendChild(pinkFull);
      pinkFull.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
          <div class="text-container" style="height:40px; display:flex; align-items:center; justify-content:center; font-size: clamp(24px,5vw,32px);"></div>
          <button class="pink-confirm-btn" style="display:none;">确认 ♡</button>
        </div>
      `;
      const textDom = pinkFull.querySelector('.text-container');
      const confirmBtn = pinkFull.querySelector('.pink-confirm-btn');
      let textArr = [fillText("{lover}爱{beloved}"), fillText("好喜欢{beloved}"), fillText("想和你一直在一起")];
      let textIndex = 0;

      function showText() {
        if (textIndex < textArr.length) {
          textDom.innerText = textArr[textIndex];
          textIndex++;
          if (textIndex === textArr.length) {
            setTimeout(() => { confirmBtn.style.display = "block"; }, 1000);
          }
          setTimeout(showText, 1500);
        }
      }
      showText();

      confirmBtn.onclick = function() {
        pinkFull.remove();
        const endModal = document.createElement("div");
        endModal.className = "end-modal";
        endModal.innerHTML = `
          <div style="font-size:18px;font-weight:bold;color:#ff6b9d;margin-bottom:15px;">💗 测试已结束</div>
          <div style="color:#666;margin-bottom:16px;">${fillText("{lover}在等{beloved}")}</div>
          <button class="start-btn" id="restartBtn" style="background: linear-gradient(135deg, #ff8fab, #ff6b9d); color: #fff; border: none; padding: 12px 28px; border-radius: 14px; font-size: 16px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 16px rgba(255,107,157,0.3);">再来一次 ♡</button>
        `;
        document.body.appendChild(endModal);
        document.getElementById("restartBtn").onclick = function() {
          endModal.remove();
          clearAllEffects();
          resetDiary();
          current = 0;
          answers = Array(questions.length).fill(null);
          wrongCount = 0;
          lockSubmitBtn = false;
          fromQ4ToQ5 = false;
          boxEl.style.display = "none";
          openStartModal();
        };
      };
    };
  }

  // 日记页切换
  document.getElementById("toPage2").onclick = function() {
    diaryPage1.style.display = "none";
    diaryPage2.style.display = "block";
  };
  document.getElementById("toPage1").onclick = function() {
    diaryPage2.style.display = "none";
    diaryPage1.style.display = "block";
  };
  document.getElementById("toPage3").onclick = function() {
    diaryPage2.style.display = "none";
    diaryPage3.style.display = "block";
  };
  document.getElementById("toPage2Back").onclick = function() {
    diaryPage3.style.display = "none";
    diaryPage2.style.display = "block";
  };
  document.getElementById("toPage4").onclick = function() {
    diaryPage3.style.display = "none";
    diaryPage4.style.display = "block";
  };


  // ═══════════════════════════════════════════════════════
  // 额外萌系特效
  // ═══════════════════════════════════════════════════════

  function createBgDecorations() {
    const container = document.getElementById('bgDecorations');
    if (!container) return;
    container.innerHTML = '';
    // 星星
    for (let i = 0; i < 20; i++) {
      const star = document.createElement('div');
      star.className = 'bg-star';
      star.innerText = ['✨', '⭐', '💫', '🌟'][Math.floor(Math.random() * 4)];
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * 100 + 'vh';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.fontSize = (12 + Math.random() * 10) + 'px';
      container.appendChild(star);
    }
    // 爱心
    for (let i = 0; i < 8; i++) {
      const heart = document.createElement('div');
      heart.className = 'floating-heart-bg';
      heart.innerText = ['♡', '♥', '💗', '💕', '💖'][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDelay = Math.random() * 8 + 's';
      heart.style.animationDuration = (6 + Math.random() * 6) + 's';
      heart.style.fontSize = (14 + Math.random() * 12) + 'px';
      container.appendChild(heart);
    }
  }

  function createBubbles() {
    for (let i = 0; i < 15; i++) {
      setTimeout(() => {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = 20 + Math.random() * 60;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + 'vw';
        b.style.animationDuration = (5 + Math.random() * 5) + 's';
        b.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 12000);
      }, i * 300);
    }
  }

  function createSparkles() {
    for (let i = 0; i < 10; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.innerText = ['✨', '💫', '⭐', '🌸'][Math.floor(Math.random() * 4)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 100 + 'vh';
      s.style.animationDelay = Math.random() * 2 + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 4000);
    }
  }

  // 点击爱心爆发效果
  function heartBurst(x, y) {
    const hearts = ['♡', '♥', '💗', '💕', '💖', '💓', '💞'];
    for (let i = 0; i < 12; i++) {
      const h = document.createElement('div');
      h.innerText = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.position = 'fixed';
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      h.style.fontSize = (14 + Math.random() * 20) + 'px';
      h.style.pointerEvents = 'none';
      h.style.zIndex = '99999';
      h.style.color = '#ff6b9d';
      h.style.transition = 'all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      document.body.appendChild(h);
      requestAnimationFrame(() => {
        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random() * 150;
        h.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist - 80}px) scale(0)`;
        h.style.opacity = '0';
      });
      setTimeout(() => h.remove(), 1200);
    }
  }

  // ═══════════════════════════════════════════════════════
  // 核心渲染
  // ═══════════════════════════════════════════════════════

  function renderQuestion() {
    clearAllEffects();
    const q = questions[current];
    document.getElementById("progress").innerText = `第 ${current+1} 题 / 共 ${total} 题`;
    document.getElementById("progressFill").style.width = `${((current + 1) / total) * 100}%`;
    document.getElementById("question").innerText = fillText(q.q);
    optionsEl.innerHTML = "";
    boxEl.style.opacity = "1";

    const emojis = ['💗', '💕', '💖', '💓'];

    q.opt.forEach((item, idx) => {
      const div = document.createElement("div");
      div.className = "option";
      if (answers[current] === idx) div.classList.add("selected");
      div.innerHTML = `<span class="emoji-prefix">${emojis[idx]}</span>` + fillText(item);
      div.onclick = () => {
        answers[current] = idx;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        div.classList.add('selected');
        heartBurst(div.getBoundingClientRect().left + div.offsetWidth / 2, div.getBoundingClientRect().top + div.offsetHeight / 2);

        if (current === 24) {
          startQ25Effect();
          return;
        }
        if (current === 2) {
          idx < 3 ? triggerSweet(fillText("{lover}会难过TT"), current + 1) : triggerSweet(fillText("{lover}好开心♡"), current + 1);
          return;
        }
        if (current === 7) {
          startQ8Effect(idx);
          return;
        }
        if (current === 15) {
          setTimeout(() => openQ16Modal(), 100);
          return;
        }
        if (current === 16) {
          if (idx === 0 || idx === 1) {
            startLoveTyping();
          } else {
            div.classList.add("locked");
            div.innerHTML = `<span class="emoji-prefix">💔</span>` + fillText("{lover}会伤心的...");
            div.onclick = null;
          }
          return;
        }
        if (current === 19) {
          if (idx === 0) {
            div.innerHTML = `<span class="emoji-prefix">💔</span>` + fillText("{beloved}别拒绝{lover}嘛");
            div.classList.add("locked");
            div.onclick = null;
          }
          if (idx === 1) {
            div.innerHTML = `<span class="emoji-prefix">💔</span>` + fillText("{lover}好委屈TT");
            div.classList.add("locked");
            div.onclick = null;
          }
          if (idx === 2) {
            div.innerHTML = `<span class="emoji-prefix">💕</span>` + fillText("{lover}会吃醋的～");
            div.classList.add("locked");
            div.onclick = null;
          }
          if (idx === 3) {
            div.innerHTML = `<span class="emoji-prefix">💗</span>` + fillText("只能看着{lover}♡");
          }
          return;
        }
      };
      optionsEl.appendChild(div);
    });

    if (current === 4 && fromQ4ToQ5) {
      startQ5Effect();
      fromQ4ToQ5 = false;
    }

    prevBtn.disabled = current === 0;
    nextBtn.innerText = current === total - 1 ? "提交问卷 ♡" : "下一题";
  }

  prevBtn.onclick = () => {
    clearAllEffects();
    if (current > 0) {
      current--;
      renderQuestion();
    }
  };

  nextBtn.onclick = () => {
    clearAllEffects();
    if (current === 3) fromQ4ToQ5 = true;
    if (current < total - 1) {
      current++;
      renderQuestion();
    } else {
      showFinalModal();
    }
  };

  // ═══════════════════════════════════════════════════════
  // 名字输入与开始
  // ═══════════════════════════════════════════════════════

  document.getElementById('nameBtn').onclick = function() {
    const loverVal = document.getElementById('loverName').value.trim();
    const belovedVal = document.getElementById('belovedName').value.trim();
    if (loverVal) LOVER = loverVal;
    if (belovedVal) BELOVED = belovedVal;
    document.getElementById('nameModal').remove();
    createBgDecorations();
    createBubbles();
    openStartModal();
  };

  function openStartModal() {
    clearAllEffects();
    mainBox.style.display = "none";

    const tipTexts = [
      fillText("<b style='font-size:18px;color:#ff6b9d;'>💗 欢迎参与心动契合度测试</b>"),
      fillText("<b style='font-size:16px;'>请根据对{lover}的真实感受选择答案</b>"),
      fillText("<b style='font-size:16px;'>题目含特殊互动效果，请小心被甜到♡</b>"),
      fillText("<b style='font-size:16px;'>准备就绪，开始答题</b>")
    ];
    let idx = 0;
    const modal = document.createElement("div");
    modal.className = "start-modal";
    const textDom = document.createElement("div");
    textDom.className = "start-text";
    textDom.innerHTML = tipTexts[idx];
    const redTip = document.createElement("div");
    redTip.className = "tiny-tip";
    redTip.innerText = fillText("注：本测试含糖量极高，如有不适请立即停止作答（{lover}会伤心的）");
    const btnDom = document.createElement("button");
    btnDom.className = "start-btn";
    btnDom.innerText = "继续 ♡";
    btnDom.onclick = function() {
      idx++;
      if (idx < tipTexts.length) {
        textDom.innerHTML = tipTexts[idx];
        if (idx === tipTexts.length - 1) {
          btnDom.innerText = "进入 ♡";
        }
      } else {
        modal.remove();
        mainBox.style.display = "flex";
        renderQuestion();
      }
    };
    modal.appendChild(textDom);
    modal.appendChild(redTip);
    modal.appendChild(btnDom);
    document.body.appendChild(modal);
  }

  // 全局点击爱心效果
  document.addEventListener('click', (e) => {
    if (e.target.tagName === 'BUTTON' || e.target.classList.contains('option')) return;
    if (Math.random() > 0.7) {
      const h = document.createElement('div');
      h.innerText = ['♡', '♥', '💗', '💕'][Math.floor(Math.random() * 4)];
      h.style.position = 'fixed';
      h.style.left = e.clientX + 'px';
      h.style.top = e.clientY + 'px';
      h.style.fontSize = '20px';
      h.style.pointerEvents = 'none';
      h.style.zIndex = '99999';
      h.style.color = '#ff6b9d';
      h.style.transition = 'all 0.8s ease-out';
      document.body.appendChild(h);
      requestAnimationFrame(() => {
        h.style.transform = 'translateY(-40px) scale(1.5)';
        h.style.opacity = '0';
      });
      setTimeout(() => h.remove(), 800);
    }
  });

  // 定期闪光
  setInterval(() => {
    if (document.getElementById('mainBox') && mainBox.style.display === 'flex') {
      createSparkles();
    }
  }, 8000);
</script>
